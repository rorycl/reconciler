name: Security & Quality Audit

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    container: golang:1.26

    steps:
    - uses: actions/checkout@v6

    # setup go
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        check-latest: false
        cache: true

    # build
    - name: Verify Build
      run: go build -v ./cmd/reconciler

    # vet
    - name: Run Vet
      run: go vet ./...

    # run vulncheck
    - name: Install and Run Govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...
